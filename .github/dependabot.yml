version: 2

updates:
  - package-ecosystem: npm
    directory: /
    exclude-paths:
      - "spec/__fixtures__/**"
    versioning-strategy: increase
    open-pull-requests-limit: 10
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Toronto
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps):"
      include: scope
    groups:
      linters:
        patterns:
          - "oxlint"
          - "oxlint-*"
          - "oxfmt"
          - "cspell"
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@types/ws"
          - "ws"
          - "nock"
      build-tools:
        patterns:
          - "rolldown"
          - "rimraf"
          - "typescript"
          - "ts-node"
          - "@changesets/*"
      graphql:
        patterns:
          - "graphql"
          - "graphql-*"
          - "@graphql-codegen/*"
      sentry:
        patterns:
          - "@sentry/*"
      fs-extra:
        patterns:
          - "@types/fs-extra"
          - "fs-extra"
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "@types/node" # manually updated
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Toronto
    labels:
      - dependencies
    commit-message:
      prefix: "ci(deps):"
    groups:
      github-actions:
        patterns:
          - "*"
