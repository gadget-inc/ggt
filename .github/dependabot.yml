version: 2
updates:
  - package-ecosystem: npm
    directories:
      - "/"
      - "!/spec/__fixtures__/**"
    versioning-strategy: increase
    open-pull-requests-limit: 10
    schedule:
      interval: daily
    ignore:
      - dependency-name: "@types/node" # manually updated
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
